<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Fluxo de POPs - Compliance</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel para processar JSX no navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Bibliotecas para geração de PDF em Alta Qualidade -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- Import Map para gerir dependências (React, ReactDOM, Lucide) -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.263.1"
        }
    }
    </script>
    
    <!-- Estilos globais para animações -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Scrollbar personalizada */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 overflow-x-hidden">

    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Clock, Save, FileText, AlertTriangle, Calendar, CheckCircle, Trash2, BarChart2, Activity, UploadCloud, Download, Award, TrendingUp, ChevronDown, ChevronUp, Filter, ArrowLeft, Target, Layers, FileDown, Play, X, ChevronLeft, ChevronRight, Maximize2 } from 'lucide-react';

        // Estado Inicial do Formulário Adaptado
        const initialFormState = {
            projeto: '',
            titulo: '',
            dataInicio: new Date().toISOString().split('T')[0],
            complexidade: 'Média',
            areaEnvolvida: '',
            politica: 'Não',
            manuais: 'Não',
            fluxograma: 'Não',
            pdfFile: null,
            // Fase 1: Levantamento e Diagnóstico (15%)
            fase1Responsavel: '', fase1Departamento: '', fase1Planejado: 3, fase1Executado: 0,
            // Fase 2: Desenho do Processo (20%)
            fase2Responsavel: '', fase2Departamento: '', fase2Planejado: 4, fase2Executado: 0,
            // Fase 3: Documentação (POP) (40%)
            fase3Responsavel: '', fase3Departamento: '', fase3Planejado: 8, fase3Executado: 0,
            // Fase 4: Validação e Aprovação (15%)
            fase4Responsavel: '', fase4Departamento: '', fase4Planejado: 3, fase4Executado: 0,
            // Fase 5: Treinamento e Divulgação (10%)
            fase5Responsavel: '', fase5Departamento: '', fase5Planejado: 2, fase5Executado: 0,
        };

        // Dados de Exemplo (Mock) Conforme Solicitado
        const mockPops = [
            {
                id: 1708690000000,
                projeto: 'Procedimento de Inventário',
                titulo: 'POP - Inventário Geral do Estoque',
                dataInicio: new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0], 
                complexidade: 'Alta',
                areaEnvolvida: 'Logística / Controladoria',
                politica: 'Sim', manuais: 'Não', fluxograma: 'Sim',
                pdfUrl: null, pdfName: null,
                fase1Responsavel: 'João Silva', fase1Departamento: 'Logística', fase1Planejado: 5, fase1Executado: 5,
                fase2Responsavel: 'Maria Costa', fase2Departamento: 'Processos', fase2Planejado: 7, fase2Executado: 7,
                fase3Responsavel: 'Carlos Souza', fase3Departamento: 'Qualidade', fase3Planejado: 14, fase3Executado: 16, 
                fase4Responsavel: 'Diretoria', fase4Departamento: 'Diretoria', fase4Planejado: 5, fase4Executado: 0, 
                fase5Responsavel: 'RH', fase5Departamento: 'Treinamento', fase5Planejado: 4, fase5Executado: 0, 
                totalPlanejado: 35,
                totalExecutado: 28
            },
            {
                id: 1708690000001,
                projeto: 'Documentos Sócios',
                titulo: 'POP - Admissão e Saída de Sócios',
                dataInicio: new Date(new Date().getFullYear(), new Date().getMonth(), 5).toISOString().split('T')[0],
                complexidade: 'Média',
                areaEnvolvida: 'Jurídico / Societário',
                politica: 'Sim', manuais: 'Sim', fluxograma: 'Sim',
                pdfUrl: null, pdfName: null,
                fase1Responsavel: 'Dra. Ana', fase1Departamento: 'Jurídico', fase1Planejado: 3, fase1Executado: 3,
                fase2Responsavel: 'Lucas', fase2Departamento: 'Processos', fase2Planejado: 5, fase2Executado: 4, 
                fase3Responsavel: 'Fernanda', fase3Departamento: 'Qualidade', fase3Planejado: 10, fase3Executado: 0, 
                fase4Responsavel: 'Conselho', fase4Departamento: 'Diretoria', fase4Planejado: 3, fase4Executado: 0, 
                fase5Responsavel: 'Comunicação', fase5Departamento: 'Marketing', fase5Planejado: 2, fase5Executado: 0, 
                totalPlanejado: 23,
                totalExecutado: 7
            }
        ];

        const App = () => {
            const [pops, setPops] = useState(mockPops);
            const [formData, setFormData] = useState(initialFormState);
            const [viewMode, setViewMode] = useState('list'); 
            const [filterMonth, setFilterMonth] = useState('todos');
            const [filterYear, setFilterYear] = useState('todos');
            const [isExporting, setIsExporting] = useState(false);

            // Estado para o Modo Apresentação
            const [presentationMode, setPresentationMode] = useState(false);
            const [currentSlide, setCurrentSlide] = useState(0);

            // Lógica de filtro reativa
            const filteredPops = pops.filter(pop => {
                const popDate = new Date(pop.dataInicio);
                const matchMonth = filterMonth === 'todos' || (popDate.getMonth() + 1) === parseInt(filterMonth);
                const matchYear = filterYear === 'todos' || popDate.getFullYear() === parseInt(filterYear);
                return matchMonth && matchYear;
            });

            // Ativar atalhos de teclado para a apresentação
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (!presentationMode) return;
                    if (e.key === 'Escape') setPresentationMode(false);
                    if (e.key === 'ArrowRight' && currentSlide < filteredPops.length) {
                        setCurrentSlide(prev => prev + 1);
                    }
                    if (e.key === 'ArrowLeft' && currentSlide > 0) {
                        setCurrentSlide(prev => prev - 1);
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [presentationMode, currentSlide, filteredPops.length]);

            const handleChange = (e) => {
                const { name, value, files } = e.target;
                if (name === 'pdfFile') {
                    setFormData(prev => ({ ...prev, pdfFile: files[0] }));
                } else {
                    setFormData(prev => ({
                        ...prev,
                        [name]: name.includes('Planejado') || name.includes('Executado') ? Number(value) : value
                    }));
                }
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                const totalPlan = formData.fase1Planejado + formData.fase2Planejado + formData.fase3Planejado + formData.fase4Planejado + formData.fase5Planejado;
                const totalExec = formData.fase1Executado + formData.fase2Executado + formData.fase3Executado + formData.fase4Executado + formData.fase5Executado;

                const novoPop = {
                    id: Date.now(),
                    ...formData,
                    pdfUrl: formData.pdfFile ? URL.createObjectURL(formData.pdfFile) : null,
                    pdfName: formData.pdfFile ? formData.pdfFile.name : null,
                    totalPlanejado: totalPlan,
                    totalExecutado: totalExec,
                };
                setPops([...pops, novoPop]);
                setViewMode('list');
                setFormData(initialFormState);
            };

            const deletePop = (id) => {
                setPops(pops.filter(p => p.id !== id));
            };

            // Função para Exportar PDF em ALTA FIDELIDADE
            const handleExportPDF = async () => {
                setIsExporting(true);
                const element = document.getElementById('dashboard-export-area');
                
                if (!element) {
                    setIsExporting(false);
                    return;
                }

                try {
                    const style = document.createElement('style');
                    style.innerHTML = `
                        .pdf-export-mode, .pdf-export-mode * {
                            animation: none !important;
                            transition: none !important;
                        }
                        .pdf-export-mode .anim-entry,
                        .pdf-export-mode .anim-pop,
                        .pdf-export-mode .animate-fade-in {
                            opacity: 1 !important;
                            transform: none !important;
                        }
                        .pdf-export-mode {
                            background-color: #f1f5f9 !important;
                            padding: 30px !important;
                            border-radius: 0 !important;
                        }
                    `;
                    document.head.appendChild(style);
                    element.classList.add('pdf-export-mode');

                    await new Promise(resolve => setTimeout(resolve, 300));

                    const canvas = await window.html2canvas(element, {
                        scale: 2, 
                        useCORS: true,
                        logging: false,
                        backgroundColor: '#f1f5f9', 
                        windowWidth: 1200 
                    });

                    element.classList.remove('pdf-export-mode');
                    document.head.removeChild(style);

                    const imgData = canvas.toDataURL('image/png'); 
                    const pdf = new window.jspdf.jsPDF('p', 'mm', 'a4');
                    
                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                    
                    let heightLeft = pdfHeight;
                    let position = 0;
                    const pageHeight = pdf.internal.pageSize.getHeight();

                    pdf.addImage(imgData, 'PNG', 0, position, pdfWidth, pdfHeight);
                    heightLeft -= pageHeight;

                    while (heightLeft > 0) {
                        position = heightLeft - pdfHeight;
                        pdf.addPage();
                        pdf.addImage(imgData, 'PNG', 0, position, pdfWidth, pdfHeight);
                        heightLeft -= pageHeight;
                    }

                    const fileName = filterMonth === 'todos' 
                        ? `Relatorio_POPs_Geral.pdf` 
                        : `Relatorio_POPs_${filterMonth}_${filterYear}.pdf`;
                        
                    pdf.save(fileName);
                } catch (error) {
                    console.error("Erro ao gerar PDF:", error);
                    alert("Ocorreu um erro ao gerar o PDF. Por favor, tente novamente.");
                } finally {
                    setIsExporting(false);
                }
            };

            const calcularPercentualGeral = (pop) => {
                const weights = [15, 20, 40, 15, 10];
                const phases = [
                    { plan: pop.fase1Planejado, exec: pop.fase1Executado },
                    { plan: pop.fase2Planejado, exec: pop.fase2Executado },
                    { plan: pop.fase3Planejado, exec: pop.fase3Executado },
                    { plan: pop.fase4Planejado, exec: pop.fase4Executado },
                    { plan: pop.fase5Planejado, exec: pop.fase5Executado },
                ];
                let totalProgress = 0;
                phases.forEach((p, idx) => {
                    if (p.plan === 0 && p.exec > 0) totalProgress += weights[idx]; 
                    else if (p.plan > 0) {
                        const perc = Math.min(1, p.exec / p.plan); 
                        totalProgress += perc * weights[idx];
                    }
                });
                return totalProgress.toFixed(1);
            };

            const getStatusConsolidado = (pop, isDelayed) => {
                const perc = parseFloat(calcularPercentualGeral(pop));
                if (perc >= 100) return isDelayed ? 'Concluído com Atraso' : 'Concluído no Prazo';
                if (isDelayed && perc < 100) return 'Em Andamento (Atrasado)';
                return 'Em Andamento (No Prazo)';
            };

            const getDashboardStats = (dataSet = pops) => {
                if (dataSet.length === 0) return null;
                
                const totalPops = dataSet.length;
                const delayedPops = dataSet.filter(p => p.totalExecutado > p.totalPlanejado).length;
                const onTimePercentage = ((totalPops - delayedPops) / totalPops) * 100;
                const avgCycleTime = dataSet.reduce((acc, curr) => acc + curr.totalExecutado, 0) / totalPops;
                
                const bottlenecks = { 'Levantamento e Diagnóstico': 0, 'Desenho do Processo': 0, 'Documentação': 0, 'Validação e Aprovação': 0, 'Treinamento': 0 };
                const deptDelays = {};
                
                dataSet.forEach(pop => {
                    if (pop.fase1Executado > pop.fase1Planejado) { bottlenecks['Levantamento e Diagnóstico']++; if (pop.fase1Departamento) deptDelays[pop.fase1Departamento] = (deptDelays[pop.fase1Departamento] || 0) + 1; }
                    if (pop.fase2Executado > pop.fase2Planejado) { bottlenecks['Desenho do Processo']++; if (pop.fase2Departamento) deptDelays[pop.fase2Departamento] = (deptDelays[pop.fase2Departamento] || 0) + 1; }
                    if (pop.fase3Executado > pop.fase3Planejado) { bottlenecks['Documentação']++; if (pop.fase3Departamento) deptDelays[pop.fase3Departamento] = (deptDelays[pop.fase3Departamento] || 0) + 1; }
                    if (pop.fase4Executado > pop.fase4Planejado) { bottlenecks['Validação e Aprovação']++; if (pop.fase4Departamento) deptDelays[pop.fase4Departamento] = (deptDelays[pop.fase4Departamento] || 0) + 1; }
                    if (pop.fase5Executado > pop.fase5Planejado) { bottlenecks['Treinamento']++; if (pop.fase5Departamento) deptDelays[pop.fase5Departamento] = (deptDelays[pop.fase5Departamento] || 0) + 1; }
                });
                
                const biggestBottleneckEntry = Object.entries(bottlenecks).reduce((a, b) => a[1] > b[1] ? a : b);
                const biggestBottleneck = biggestBottleneckEntry[1] > 0 ? biggestBottleneckEntry[0] : "Nenhum";
                
                const rankedDepts = Object.entries(deptDelays).sort((a, b) => b[1] - a[1]).map(([name, count]) => ({ name, count }));
                
                const completedPops = dataSet.filter(p => parseFloat(calcularPercentualGeral(p)) >= 100);
                const bestPop = completedPops.length > 0 
                    ? [...completedPops].sort((a, b) => a.totalExecutado - b.totalExecutado)[0]
                    : null;
                
                return { totalPops, onTimePercentage, avgCycleTime, biggestBottleneck, rankedDepts, bestPop };
            };

            // Reutiliza o design do resumo para poder ser injetado também no modo apresentação
            const renderSummaryStats = (stats, isPresentation = false) => {
                if (!stats) return null;
                return (
                    <div className={`bg-red-900 rounded-2xl p-6 text-white shadow-xl shadow-red-900/20 border border-red-800 transition-all ${isPresentation ? '' : 'hover:shadow-2xl'}`}>
                        <h2 className="text-xl font-bold mb-6 flex items-center gap-2">Resumo do Período</h2>
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                            <div className={`bg-white p-4 rounded-xl border-l-4 border-red-800 shadow-sm ${isPresentation ? 'anim-pop delay-100' : 'anim-pop delay-300 transform hover:-translate-y-1 transition-transform duration-300'}`}>
                                <p className="text-red-900/70 text-xs uppercase font-bold tracking-wider">Total de POPs</p>
                                <p className="text-3xl font-bold mt-1 text-red-900">{stats.totalPops}</p>
                            </div>
                            <div className={`bg-white p-4 rounded-xl border-l-4 border-red-800 shadow-sm ${isPresentation ? 'anim-pop delay-200' : 'anim-pop delay-400 transform hover:-translate-y-1 transition-transform duration-300'}`}>
                                <p className="text-red-900/70 text-xs uppercase font-bold tracking-wider">% Dentro do Prazo</p>
                                <p className={`text-3xl font-bold mt-1 ${stats.onTimePercentage < 70 ? 'text-red-600' : 'text-emerald-600'}`}>{stats.onTimePercentage.toFixed(0)}%</p>
                            </div>
                            <div className={`bg-white p-4 rounded-xl border-l-4 border-red-800 shadow-sm ${isPresentation ? 'anim-pop delay-300' : 'anim-pop delay-500 transform hover:-translate-y-1 transition-transform duration-300'}`}>
                                <p className="text-red-900/70 text-xs uppercase font-bold tracking-wider">Ciclo Médio (Dias)</p>
                                <p className="text-3xl font-bold mt-1 text-red-900">{stats.avgCycleTime.toFixed(1)}</p>
                            </div>
                            <div className={`bg-white p-4 rounded-xl border-l-4 border-red-800 shadow-sm ${isPresentation ? 'anim-pop delay-400' : 'anim-pop delay-600 transform hover:-translate-y-1 transition-transform duration-300'}`}>
                                <p className="text-red-900/70 text-xs uppercase font-bold tracking-wider">Maior Gargalo</p>
                                <p className="text-lg font-bold mt-2 text-red-600 flex items-center gap-1"><AlertTriangle size={16}/> {stats.biggestBottleneck}</p>
                            </div>
                        </div>
                        
                        <div className="mt-8 grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div className={`bg-red-950/50 p-4 rounded-xl border border-red-800/50 ${isPresentation ? 'anim-entry delay-500' : 'anim-entry delay-500 hover:bg-red-950/70 transition-colors'}`}>
                                <h3 className="text-sm font-bold uppercase text-red-200 mb-3 flex items-center gap-2"><Award size={16}/> Processo Mais Ágil</h3>
                                {stats.bestPop ? (
                                    <div>
                                        <p className="text-lg font-bold">{stats.bestPop.titulo}</p>
                                        <p className="text-xs text-red-200 mt-1 flex items-center gap-1"><CheckCircle size={12}/> Concluído em <strong className="text-white">{stats.bestPop.totalExecutado}</strong> dias</p>
                                    </div>
                                ) : <p className="text-sm text-red-300">Nenhum POP concluído a 100%.</p>}
                            </div>
                            <div className={`bg-red-950/50 p-4 rounded-xl border border-red-800/50 ${isPresentation ? 'anim-entry delay-600' : 'anim-entry delay-600 hover:bg-red-950/70 transition-colors'}`}>
                                <h3 className="text-sm font-bold uppercase text-red-200 mb-3 flex items-center gap-2"><AlertTriangle size={16}/> Top Atrasos por Depto</h3>
                                {stats.rankedDepts.length > 0 ? (
                                    <ul className="text-sm space-y-2">
                                        {stats.rankedDepts.slice(0,3).map((d, i) => (
                                            <li key={i} className="flex justify-between items-center bg-red-900/30 p-2 rounded-lg">
                                                <span>{d.name}</span> <span className="font-bold bg-red-600 px-2 py-0.5 rounded text-xs">{d.count} atrasos</span>
                                            </li>
                                        ))}
                                    </ul>
                                ) : <p className="text-sm text-red-300">Sem atrasos registrados.</p>}
                            </div>
                        </div>
                    </div>
                );
            };

            const DiagnosticCard = ({ pop, defaultExpanded = false }) => {
                const [isExpanded, setIsExpanded] = useState(defaultExpanded);
                const isDelayed = pop.totalExecutado > pop.totalPlanejado;
                const delayDays = pop.totalExecutado > pop.totalPlanejado ? pop.totalExecutado - pop.totalPlanejado : 0;
                const isOverallOnTime = pop.totalExecutado <= pop.totalPlanejado;
                const progressoGeral = calcularPercentualGeral(pop);
                const statusStr = getStatusConsolidado(pop, isDelayed);
                
                const stages = [
                    { name: 'Levantamento e Diagnóstico (15%)', plan: pop.fase1Planejado, exec: pop.fase1Executado, resp: pop.fase1Responsavel, dept: pop.fase1Departamento },
                    { name: 'Desenho do Processo (20%)', plan: pop.fase2Planejado, exec: pop.fase2Executado, resp: pop.fase2Responsavel, dept: pop.fase2Departamento },
                    { name: 'Documentação / POP (40%)', plan: pop.fase3Planejado, exec: pop.fase3Executado, resp: pop.fase3Responsavel, dept: pop.fase3Departamento },
                    { name: 'Validação e Aprovação (15%)', plan: pop.fase4Planejado, exec: pop.fase4Executado, resp: pop.fase4Responsavel, dept: pop.fase4Departamento },
                    { name: 'Treinamento e Divulgação (10%)', plan: pop.fase5Planejado, exec: pop.fase5Executado, resp: pop.fase5Responsavel, dept: pop.fase5Departamento },
                ];
                
                const bottlenecks = stages.filter(stage => stage.exec > stage.plan);

                const pointsPlan = [0];
                const pointsExec = [0];
                let accP = 0; let accE = 0;
                stages.forEach(s => { accP += s.plan; accE += s.exec; pointsPlan.push(accP); pointsExec.push(accE); });
                const maxY = Math.max(accP, accE) * 1.1 || 1; 
                const width = 100; const height = 50; const stepX = width / 5; 
                const getPath = (dataPoints) => dataPoints.map((val, idx) => {
                    const x = idx * stepX; const y = height - ((val / maxY) * height);
                    return `${idx === 0 ? 'M' : 'L'} ${x} ${y}`;
                }).join(' ');
                const pathPlan = getPath(pointsPlan);
                const pathExec = getPath(pointsExec);

                return (
                <div className="bg-white rounded-xl shadow-md border border-slate-200 overflow-hidden mb-6 hover:shadow-lg transition-all relative" data-html2canvas-ignore-bg>
                    <div className="h-1.5 w-full bg-slate-100 relative">
                        <div className={`absolute top-0 left-0 h-full transition-all duration-1000 ${isDelayed ? 'bg-red-500' : 'bg-emerald-500'}`} style={{width: `${progressoGeral}%`}}></div>
                    </div>

                    <div className="bg-slate-50 p-4 border-b border-slate-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 cursor-pointer hover:bg-slate-100 transition-colors" onClick={() => setIsExpanded(!isExpanded)}>
                        <div className="flex items-center gap-4">
                            <div className="bg-red-900 text-white p-3 rounded-lg flex flex-col items-center justify-center w-14 h-14 shadow-inner">
                                <span className="text-[10px] font-bold opacity-80">PROG.</span>
                                <span className="font-bold text-sm leading-tight">{Math.floor(progressoGeral)}%</span>
                            </div>
                            <div>
                                <div className="flex items-center gap-2 mb-1">
                                    <span className="bg-slate-200 text-slate-700 text-[10px] px-2 py-0.5 rounded-full font-bold uppercase tracking-wider">{pop.projeto}</span>
                                    <span className={`text-[10px] px-2 py-0.5 rounded-full font-bold uppercase tracking-wider border ${pop.complexidade === 'Alta' ? 'bg-red-50 text-red-700 border-red-200' : pop.complexidade === 'Média' ? 'bg-orange-50 text-orange-700 border-orange-200' : 'bg-emerald-50 text-emerald-700 border-emerald-200'}`}>
                                        Comp. {pop.complexidade}
                                    </span>
                                </div>
                                <h3 className="text-lg font-bold text-slate-800">{pop.titulo}</h3>
                                <div className="text-xs text-slate-500 flex gap-4 mt-1">
                                    <span className="flex items-center gap-1"><Calendar size={12}/> Início: {new Date(pop.dataInicio).toLocaleDateString('pt-BR')}</span>
                                    <span className="flex items-center gap-1"><Layers size={12}/> Área: {pop.areaEnvolvida || 'N/A'}</span>
                                </div>
                            </div>
                        </div>
                        <div className="flex items-center gap-4 w-full md:w-auto justify-between md:justify-end">

                                    const percentExec = (stage.exec / maxStageVal) * 100;

                                    if (stage.exec > stage.plan) { barColor = 'bg-red-600'; textColor = 'text-red-700 font-bold'; } 
                                    else if (stage.exec < stage.plan && stage.exec > 0) { barColor = 'bg-emerald-500'; textColor = 'text-emerald-600 font-bold'; }
                                    else if (stage.exec === 0) { barColor = 'bg-slate-300'; textColor = 'text-slate-500 font-medium'; }
                                    
                                    return (
                                        <div key={idx} className="group">
                                            <div className="flex justify-between text-xs mb-1 font-medium text-slate-600">
                                                <span className="flex items-center gap-1">{stage.name}</span>

                                                const stageDelayed = stages[stageIndex].exec > stages[stageIndex].plan;

                                            })}

                        </div>
                        <div className="flex justify-end gap-3 pt-4 border-t border-slate-100">
                            <button type="button" onClick={() => setViewMode('list')} className="px-6 py-3 rounded-lg text-slate-600 font-medium hover:bg-slate-100 transition-colors">Cancelar</button>
                            <button type="submit" className="px-6 py-3 rounded-lg bg-red-900 text-white font-bold hover:bg-red-800 shadow-lg shadow-red-200 transition-all flex items-center gap-2"><Save size={20} /> Salvar Processo</button>
                        </div>
                        </form>
                    </div>
                    )}

                    {viewMode === 'dashboard' && renderDashboard()}

                    {viewMode === 'list' && (
                    <div className="animate-fade-in">
                        {pops.length === 0 ? (
                        <div className="text-center py-20 bg-white rounded-2xl border border-dashed border-red-200">
                            <div className="bg-red-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4"><FileText size={40} className="text-red-300" /></div>
                            <h3 className="text-xl font-bold text-slate-700">Nenhum POP cadastrado</h3>
                            <p className="text-slate-500 mt-2 mb-6">Comece adicionando um novo processo para visualizar os indicadores.</p>
                            <button onClick={() => setViewMode('form')} className="px-6 py-3 rounded-lg bg-red-900 text-white font-bold hover:bg-red-800 shadow-lg transition-all">Criar Primeiro POP</button>
                        </div>
                        ) : (
                        <div className="grid grid-cols-1 gap-6">
                            <div className="flex items-center justify-between mb-2">
                                <h2 className="text-lg font-bold text-slate-700">Detalhamento dos Projetos / Processos</h2>
                            </div>
                            {pops.map(pop => <DiagnosticCard key={pop.id} pop={pop} />)}
                        </div>
                        )}
                    </div>
                    )}
                </main>

                {/* OVERLAY DO MODO APRESENTAÇÃO */}
                {presentationMode && (
                    <div className="fixed inset-0 z-[100] bg-slate-50 text-slate-800 flex flex-col overflow-hidden animate-fade-in">
                        {/* Header Minimalista Claro */}
                        <div className="flex justify-between items-center px-6 py-4 border-b border-slate-200 bg-white shadow-sm z-10">
                            <div className="flex items-center gap-3 font-bold text-lg">
                                <Maximize2 className="text-red-900" size={20}/> 
                                <span className="text-slate-800">Apresentação de Resultados</span>
                                <span className="text-slate-500 text-sm font-normal ml-4 border-l border-slate-300 pl-4">
                                    {filterMonth !== 'todos' ? `Filtro: Mês ${filterMonth}/${filterYear}` : 'Filtro: Todos os Períodos'}
                                </span>
                            </div>
                            <button onClick={() => setPresentationMode(false)} className="p-2 bg-slate-100 hover:bg-red-50 rounded-full transition-colors flex items-center gap-2 text-slate-500 hover:text-red-700">
                                <span className="text-xs font-semibold">ESC para fechar</span> <X size={20}/>
                            </button>
                        </div>
                        
                        {/* Área Principal do Slide sem scroll (overflow-hidden) */}
                        <div className="flex-1 relative flex items-center justify-center p-4 md:p-8 overflow-hidden">
                            
                            {/* Botão Retroceder */}
                            <button 
                                onClick={() => setCurrentSlide(prev => prev - 1)} 
                                disabled={currentSlide === 0}
                                className="absolute left-2 md:left-6 z-10 p-3 md:p-4 rounded-full bg-white text-slate-700 hover:bg-slate-100 disabled:opacity-0 disabled:cursor-not-allowed transition-all shadow-lg border border-slate-200"
                            >
                                <ChevronLeft size={32}/>
                            </button>

                            {/* Conteúdo do Slide com FORÇA de re-renderização através da KEY e Redimensionamento (Scale) para evitar Scroll */}
                            <div className="w-full max-w-5xl max-h-full flex flex-col justify-center items-center" key={`slide-${currentSlide}`}>
                                {currentSlide === 0 ? (
                                    <div className="animate-fade-in w-full transform scale-90 md:scale-100 origin-center transition-transform">
                                        {/* Slide 0: Resumo Geral */}
                                        <h2 className="text-center text-3xl font-bold mb-8 text-slate-800 tracking-wide">Visão Geral Consolidada</h2>
                                        {renderSummaryStats(stats, true)}
                                    </div>
                                ) : (
                                    <div className="animate-fade-in w-full transform scale-90 md:scale-95 origin-center transition-transform">
                                        {/* Slides N: Detalhamento por POP */}
                                        <h2 className="text-center text-xl font-bold mb-4 text-slate-500 uppercase tracking-widest">
                                            Processo {currentSlide} de {filteredPops.length}
                                        </h2>
                                        {/* A key única garante que o DiagnosticCard monte de raiz e rode as animações do zero! */}
                                        <div className="w-full relative">
                                            <DiagnosticCard key={`diag-slide-${filteredPops[currentSlide - 1].id}`} pop={filteredPops[currentSlide - 1]} defaultExpanded={true} />
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* Botão Avançar */}
                            <button 
                                onClick={() => setCurrentSlide(prev => prev + 1)} 
                                disabled={currentSlide === filteredPops.length}
                                className="absolute right-2 md:right-6 z-10 p-3 md:p-4 rounded-full bg-white text-slate-700 hover:bg-slate-100 disabled:opacity-0 disabled:cursor-not-allowed transition-all shadow-lg border border-slate-200"
                            >
                                <ChevronRight size={32}/>
                            </button>
                        </div>
                        
                        {/* Rodapé / Progresso Claro */}
                        <div className="p-4 bg-white border-t border-slate-200 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] flex justify-center items-center gap-3 z-10">
                            {Array.from({length: filteredPops.length + 1}).map((_, i) => (
                                <div 
                                    key={`dot-${i}`} 
                                    onClick={() => setCurrentSlide(i)}
                                    title={i === 0 ? 'Resumo' : `Processo ${i}`}
                                    className={`h-2.5 rounded-full transition-all duration-500 cursor-pointer ${i === currentSlide ? 'w-12 bg-red-900 shadow-md' : 'w-3 bg-slate-300 hover:bg-slate-400'}`} 
                                ></div>
                            ))}
                        </div>
                    </div>
                )}
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
