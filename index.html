<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Fluxo de POPs - Compliance</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel para processar JSX no navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Import Map para gerir dependências (React, ReactDOM, Lucide) -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.263.1"
        }
    }
    </script>
    
    <!-- Estilos globais para animações -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Scrollbar personalizada */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800">

    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Clock, Save, FileText, AlertTriangle, Calendar, CheckCircle, Trash2, BarChart2, Activity, UploadCloud, Download, Award, TrendingUp, ChevronDown, ChevronUp, Filter, ArrowLeft } from 'lucide-react';

        const App = () => {
            // Estado para armazenar a lista de POPs
            const [pops, setPops] = useState([]);
            
            // Estado para o formulário
            const [formData, setFormData] = useState({
                titulo: '',
                dataInicio: new Date().toISOString().split('T')[0],
                pdfFile: null,
                reuniaoResponsavel: '',
                reuniaoDepartamento: '',
                retornoResponsavel: '',
                retornoDepartamento: '',
                producaoResponsavel: '',
                producaoDepartamento: '',
                aprovacaoResponsavel: '',
                aprovacaoDepartamento: '',
                reuniaoPlanejado: 1,
                reuniaoExecutado: 1,
                retornoPlanejado: 2,
                retornoExecutado: 2,
                producaoPlanejado: 5,
                producaoExecutado: 5,
                aprovacaoPlanejado: 2,
                aprovacaoExecutado: 2,
            });

            // Estados de Visualização e Filtros
            const [viewMode, setViewMode] = useState('list'); // 'list', 'form', 'dashboard'
            const [filterMonth, setFilterMonth] = useState(new Date().getMonth() + 1);
            const [filterYear, setFilterYear] = useState(new Date().getFullYear());

            const handleChange = (e) => {
                const { name, value, files } = e.target;
                if (name === 'pdfFile') {
                setFormData(prev => ({ ...prev, pdfFile: files[0] }));
                } else {
                setFormData(prev => ({
                    ...prev,
                    [name]: name.includes('Planejado') || name.includes('Executado') ? Number(value) : value
                }));
                }
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                const novoPop = {
                id: Date.now(),
                ...formData,
                pdfUrl: formData.pdfFile ? URL.createObjectURL(formData.pdfFile) : null,
                pdfName: formData.pdfFile ? formData.pdfFile.name : null,
                totalPlanejado: formData.reuniaoPlanejado + formData.retornoPlanejado + formData.producaoPlanejado + formData.aprovacaoPlanejado,
                totalExecutado: formData.reuniaoExecutado + formData.retornoExecutado + formData.producaoExecutado + formData.aprovacaoExecutado,
                };
                setPops([...pops, novoPop]);
                setViewMode('list');
                setFormData({
                titulo: '',
                dataInicio: new Date().toISOString().split('T')[0],
                pdfFile: null,
                reuniaoResponsavel: '',
                reuniaoDepartamento: '',
                retornoResponsavel: '',
                retornoDepartamento: '',
                producaoResponsavel: '',
                producaoDepartamento: '',
                aprovacaoResponsavel: '',
                aprovacaoDepartamento: '',
                reuniaoPlanejado: 1,
                reuniaoExecutado: 0,
                retornoPlanejado: 2,
                retornoExecutado: 0,
                producaoPlanejado: 5,
                producaoExecutado: 0,
                aprovacaoPlanejado: 2,
                aprovacaoExecutado: 0,
                });
            };

            const deletePop = (id) => {
                setPops(pops.filter(p => p.id !== id));
            };

            // Função para calcular estatísticas (aceita dados filtrados ou usa todos)
            const getDashboardStats = (dataSet = pops) => {
                if (dataSet.length === 0) return null;
                
                const totalPops = dataSet.length;
                const delayedPops = dataSet.filter(p => p.totalExecutado > p.totalPlanejado).length;
                const onTimePercentage = ((totalPops - delayedPops) / totalPops) * 100;
                const avgCycleTime = dataSet.reduce((acc, curr) => acc + curr.totalExecutado, 0) / totalPops;
                
                const bottlenecks = { 'Reunião': 0, 'Retorno Gestor': 0, 'Produção': 0, 'Aprovação': 0 };
                const deptDelays = {};
                
                dataSet.forEach(pop => {
                if (pop.reuniaoExecutado > pop.reuniaoPlanejado) { bottlenecks['Reunião']++; if (pop.reuniaoDepartamento) deptDelays[pop.reuniaoDepartamento] = (deptDelays[pop.reuniaoDepartamento] || 0) + 1; }
                if (pop.retornoExecutado > pop.retornoPlanejado) { bottlenecks['Retorno Gestor']++; if (pop.retornoDepartamento) deptDelays[pop.retornoDepartamento] = (deptDelays[pop.retornoDepartamento] || 0) + 1; }
                if (pop.producaoExecutado > pop.producaoPlanejado) { bottlenecks['Produção']++; if (pop.producaoDepartamento) deptDelays[pop.producaoDepartamento] = (deptDelays[pop.producaoDepartamento] || 0) + 1; }
                if (pop.aprovacaoExecutado > pop.aprovacaoPlanejado) { bottlenecks['Aprovação']++; if (pop.aprovacaoDepartamento) deptDelays[pop.aprovacaoDepartamento] = (deptDelays[pop.aprovacaoDepartamento] || 0) + 1; }
                });
                
                const biggestBottleneckEntry = Object.entries(bottlenecks).reduce((a, b) => a[1] > b[1] ? a : b);
                const biggestBottleneck = biggestBottleneckEntry[1] > 0 ? biggestBottleneckEntry[0] : "Nenhum";
                
                const rankedDepts = Object.entries(deptDelays).sort((a, b) => b[1] - a[1]).map(([name, count]) => ({ name, count }));
                const bestPop = [...dataSet].sort((a, b) => a.totalExecutado - b.totalExecutado)[0];
                
                return { totalPops, onTimePercentage, avgCycleTime, biggestBottleneck, rankedDepts, bestPop };
            };

            // Componente de Cartão de Diagnóstico
            const DiagnosticCard = ({ pop }) => {
                const [isExpanded, setIsExpanded] = useState(false);
                const isDelayed = pop.totalExecutado > pop.totalPlanejado;
                const delayDays = pop.totalExecutado - pop.totalPlanejado;
                const isOverallOnTime = pop.totalExecutado <= pop.totalPlanejado;
                
                const stages = [
                { name: 'Reunião', plan: pop.reuniaoPlanejado, exec: pop.reuniaoExecutado, resp: pop.reuniaoResponsavel, dept: pop.reuniaoDepartamento },
                { name: 'Retorno Gestor', plan: pop.retornoPlanejado, exec: pop.retornoExecutado, resp: pop.retornoResponsavel, dept: pop.retornoDepartamento },
                { name: 'Produção', plan: pop.producaoPlanejado, exec: pop.producaoExecutado, resp: pop.producaoResponsavel, dept: pop.producaoDepartamento },
                { name: 'Aprovação', plan: pop.aprovacaoPlanejado, exec: pop.aprovacaoExecutado, resp: pop.aprovacaoResponsavel, dept: pop.aprovacaoDepartamento },
                ];
                
                const bottlenecks = stages.filter(stage => stage.exec > stage.plan);

                const pointsPlan = [0];
                const pointsExec = [0];
                let accP = 0; let accE = 0;
                stages.forEach(s => { accP += s.plan; accE += s.exec; pointsPlan.push(accP); pointsExec.push(accE); });
                const maxY = Math.max(accP, accE) * 1.1; 
                const width = 100; const height = 50; const stepX = width / 4; 
                const getPath = (dataPoints) => dataPoints.map((val, idx) => {
                    const x = idx * stepX; const y = height - ((val / maxY) * height);
                    return `${idx === 0 ? 'M' : 'L'} ${x} ${y}`;
                }).join(' ');
                const pathPlan = getPath(pointsPlan);
                const pathExec = getPath(pointsExec);

                return (
                <div className="bg-white rounded-xl shadow-md border border-slate-200 overflow-hidden mb-6 hover:shadow-lg transition-all relative">
                    <div className="bg-slate-50 p-4 border-b border-slate-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 cursor-pointer hover:bg-slate-100 transition-colors" onClick={() => setIsExpanded(!isExpanded)}>
                    <div className="flex items-center gap-3">
                        <div className="bg-red-900 text-white p-2 rounded-lg"><FileText size={20} /></div>
                        <div>
                        <h3 className="text-lg font-bold text-slate-800">{pop.titulo}</h3>
                        <div className="text-xs text-slate-500 flex gap-3 mt-1"><span className="flex items-center gap-1"><Calendar size={12}/> Início: {new Date(pop.dataInicio).toLocaleDateString('pt-BR')}</span></div>
                        </div>
                    </div>
                    <div className="flex items-center gap-4 w-full md:w-auto justify-between md:justify-end">
                        <div className={`flex items-center gap-1 px-3 py-1 rounded-full text-xs font-bold ${isDelayed ? 'bg-red-100 text-red-700' : 'bg-emerald-100 text-emerald-700'}`}>{isDelayed ? <><AlertTriangle size={14} /> Atrasado ({delayDays}d)</> : <><CheckCircle size={14} /> No Prazo</>}</div>
                        {pop.pdfUrl && <a href={pop.pdfUrl} download={pop.pdfName} onClick={(e) => e.stopPropagation()} className="flex items-center gap-1 text-red-900 bg-red-50 hover:bg-red-100 px-3 py-1 rounded-full text-xs font-bold transition-colors border border-red-200" title={pop.pdfName}><Download size={14} /> PDF</a>}
                        
                        <button onClick={(e) => { e.stopPropagation(); deletePop(pop.id); }} className="text-slate-400 hover:text-red-600 transition-colors"><Trash2 size={18} /></button>
                        <div className="text-slate-400">{isExpanded ? <ChevronUp size={20}/> : <ChevronDown size={20}/>}</div>
                    </div>
                    </div>

                    {isExpanded && (
                    <div className="p-5 grid grid-cols-1 lg:grid-cols-12 gap-6 animate-fade-in border-t border-slate-100">
                        <div className="lg:col-span-4 space-y-4 border-r border-slate-100 pr-4">
                        <div className="bg-slate-50 p-4 rounded-lg border border-slate-200 shadow-sm">
                            <p className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-2 flex items-center gap-1"><Clock size={14} /> Tempo Total de Criação</p>
                            <div className="flex items-baseline gap-2">
                                <span className={`text-3xl font-bold ${isDelayed ? 'text-red-700' : 'text-emerald-600'}`}>{pop.totalExecutado} dias</span>
                                <span className="text-xs text-slate-400 font-medium">(Meta: {pop.totalPlanejado} dias)</span>
                            </div>
                            <div className="mt-2 text-[10px] text-slate-400 border-t border-slate-200 pt-2">{isDelayed ? "O tempo total excedeu o planejado." : "O POP foi concluído dentro do prazo esperado."}</div>
                        </div>
                        <div>
                            <h4 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Responsáveis</h4>
                            <ul className="text-xs text-slate-600 space-y-2">
                                {stages.map((stage, idx) => (
                                    <li key={idx} className="flex flex-col border-b border-slate-100 pb-1 last:border-0">
                                    <span className="font-semibold text-slate-700">{stage.name}:</span> 
                                    <span className="text-slate-500 flex justify-between items-center">{stage.resp || '-'} <span className="text-blue-600 font-bold text-[10px] uppercase">{stage.dept || 'Geral'}</span></span>
                                    </li>
                                ))}
                            </ul>
                        </div>
                        <div className={`p-3 rounded-lg text-xs border ${bottlenecks.length > 0 ? 'bg-red-50 border-red-100 text-red-800' : 'bg-emerald-50 border-emerald-100 text-emerald-800'}`}>
                            {bottlenecks.length > 0 ? (
                                <div>
                                <strong className="block mb-2 text-red-900 border-b border-red-200 pb-1 flex items-center gap-1"><AlertTriangle size={12}/> Etapas com Gargalo:</strong>
                                <ul className="space-y-2">
                                    {bottlenecks.map((b, idx) => (
                                    <li key={idx} className="flex flex-col">
                                        <span className="font-bold text-red-900">{b.name}</span>
                                        <span className="text-[10px] opacity-90">Executado: <strong>{b.exec}d</strong> (Meta: {b.plan}d)</span>
                                        <span className="text-[10px] italic opacity-80">Resp: {b.resp || 'N/A'} - {b.dept || ''}</span>
                                    </li>
                                    ))}
                                </ul>
                                </div>
                            ) : (<div className="flex items-center gap-2"><CheckCircle size={14}/><span>Fluxo otimizado. Nenhuma etapa ultrapassou o planejado.</span></div>)}
                        </div>
                        </div>
                        <div className="lg:col-span-8">
                        <style>{`@keyframes slideWidth { from { width: 0; opacity: 0; } to { opacity: 1; } } @keyframes dash { to { stroke-dashoffset: 0; } } .path-anim { stroke-dasharray: 200; stroke-dashoffset: 200; animation: dash 2s ease-out forwards; } .pulse-circle { animation: pulse 1.5s infinite; transform-origin: center; transform-box: fill-box; } @keyframes pulse { 0% { r: 1.5; opacity: 1; } 50% { r: 3; opacity: 0.5; } 100% { r: 1.5; opacity: 1; } }`}</style>
                        <div className="space-y-5">
                            {stages.map((stage, idx) => {
                            const maxStageVal = Math.max(stage.plan, stage.exec, 1) * 1.3;
                            const percentPlan = (stage.plan / maxStageVal) * 100;
                            const percentExec = (stage.exec / maxStageVal) * 100;
                            let barColor = 'bg-blue-600'; let textColor = 'text-blue-600 font-bold';
                            if (stage.exec > stage.plan) { barColor = 'bg-red-600'; textColor = 'text-red-700 font-bold'; } else if (stage.exec < stage.plan) { barColor = 'bg-emerald-500'; textColor = 'text-emerald-600 font-bold'; }
                            return (
                                <div key={idx} className="group">
                                <div className="flex justify-between text-xs mb-1 font-medium text-slate-600">
                                    <span className="flex items-center gap-1">{stage.name} <span className="text-[10px] text-slate-400 font-normal ml-1">({stage.resp} {stage.dept ? `- ${stage.dept}` : ''})</span></span>
                                    <span className={textColor}>Exec: {stage.exec}d <span className="text-slate-300 mx-1">/</span> Meta: {stage.plan}d</span>
                                </div>
                                <div className="h-4 w-full bg-slate-100 rounded-full overflow-hidden flex relative shadow-inner">
                                    <div className="absolute top-0 left-0 h-full bg-slate-300 opacity-30 z-10 border-r border-slate-400" style={{ width: `${percentPlan}%`, animation: 'slideWidth 1s ease-out forwards' }} title={`Meta Planejada: ${stage.plan} dias`}></div>
                                    <div className={`absolute top-0 left-0 h-full z-20 ${barColor} opacity-90 shadow-md`} style={{ width: `${percentExec}%`, animation: 'slideWidth 1.5s ease-out forwards' }} title={`Executado: ${stage.exec} dias`}></div>
                                </div>
                                </div>
                            );
                            })}
                            <div className="flex justify-end gap-4 text-[10px] text-slate-500 pt-2 font-medium">
                            <div className="flex items-center gap-1"><div className="w-2 h-2 bg-emerald-500 rounded-full"></div><span>Adiantado</span></div>
                            <div className="flex items-center gap-1"><div className="w-2 h-2 bg-blue-600 rounded-full"></div><span>No Prazo</span></div>
                            <div className="flex items-center gap-1"><div className="w-2 h-2 bg-red-600 rounded-full"></div><span>Atrasado</span></div>
                            </div>
                            <div className="mt-8 pt-6 border-t border-slate-100 relative">
                            <h4 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4 flex items-center gap-2"><TrendingUp size={14} /> Evolução Acumulada (Linha do Tempo)</h4>
                            <div className="relative w-full pb-[40%]">
                                <svg viewBox="0 0 100 50" className="absolute inset-0 w-full h-full overflow-visible">
                                    <line x1="0" y1="50" x2="100" y2="50" stroke="#e2e8f0" strokeWidth="0.5" />
                                    <path d={pathPlan} fill="none" stroke="#3b82f6" strokeWidth="1" strokeDasharray="2 1" className="path-anim" style={{opacity: 0.6}} />
                                    <path d={pathExec} fill="none" stroke={isOverallOnTime ? "#10b981" : "#ef4444"} strokeWidth="1.2" className="path-anim" />
                                    {!isOverallOnTime && pointsExec.map((val, idx) => {
                                        if (idx === 0) return null;
                                        const stageIndex = idx - 1;
                                        const stageDelayed = stages[stageIndex].exec > stages[stageIndex].plan;
                                        if (!stageDelayed) return null;
                                        const x = idx * stepX; const y = 50 - ((val / maxY) * 50);
                                        return (<g key={idx}><circle cx={x} cy={y} r="1.5" fill="#ef4444" className="pulse-circle" /><text x={x} y={y - 6} textAnchor="middle" fontSize="2.5" fill="#dc2626" fontWeight="bold">+{stages[stageIndex].exec - stages[stageIndex].plan}d</text><text x={x} y={y - 3} textAnchor="middle" fontSize="2" fill="#7f1d1d" fontWeight="bold">{stages[stageIndex].dept || 'N/A'}</text></g>);
                                    })}
                                    <text x="100" y={50 - ((pointsPlan[4] / maxY) * 50) - 2} fontSize="2.5" fill="#3b82f6" textAnchor="end">Meta</text>
                                    <text x="100" y={50 - ((pointsExec[4] / maxY) * 50) + 4} fontSize="2.5" fill={isOverallOnTime ? "#10b981" : "#ef4444"} textAnchor="end">Real</text>
                                </svg>
                            </div>
                            <div className="flex gap-4 text-[10px] text-slate-400 mt-2 justify-center">
                                <span className="flex items-center gap-1"><div className="w-3 h-0.5 bg-blue-500 border border-blue-500 border-dashed"></div> Planejado (Acumulado)</span>
                                <span className="flex items-center gap-1"><div className={`w-3 h-0.5 ${isOverallOnTime ? 'bg-emerald-500' : 'bg-red-500'}`}></div> Executado (Acumulado)</span>
                            </div>
                            </div>
                        </div>
                        </div>
                    </div>
                    )}
                </div>
                );
            };

            // Renderização do conteúdo da Dashboard
            const renderDashboard = () => {
                // Filtrar POPs com base no mês e ano selecionados
                const filteredPops = pops.filter(pop => {
                    const popDate = new Date(pop.dataInicio);
                    // getMonth() retorna 0-11, adicionamos 1 para comparar com filtro 1-12
                    return (popDate.getMonth() + 1) === parseInt(filterMonth) && 
                        popDate.getFullYear() === parseInt(filterYear);
                });

                const stats = getDashboardStats(filteredPops);

                return (
                    <div className="animate-fade-in">
                        <style>{`
                            @keyframes slideUpFade {
                            from { opacity: 0; transform: translateY(20px); }
                            to { opacity: 1; transform: translateY(0); }
                            }
                            @keyframes popIn {
                            0% { opacity: 0; transform: scale(0.8); }
                            70% { transform: scale(1.05); }
                            100% { opacity: 1; transform: scale(1); }
                            }
                            .anim-entry {
                            opacity: 0;
                            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
                            }
                            .anim-pop {
                            opacity: 0;
                            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
                            }
                            .delay-100 { animation-delay: 100ms; }
                            .delay-200 { animation-delay: 200ms; }
                            .delay-300 { animation-delay: 300ms; }
                            .delay-400 { animation-delay: 400ms; }
                            .delay-500 { animation-delay: 500ms; }
                            .delay-600 { animation-delay: 600ms; }
                        `}</style>

                        <div className="flex items-center gap-2 mb-6 text-slate-700 anim-entry">
                            <button onClick={() => setViewMode('list')} className="p-2 hover:bg-slate-200 rounded-full transition-colors"><ArrowLeft size={24}/></button>
                            <h2 className="text-2xl font-bold flex items-center gap-2"><BarChart2 className="text-red-900"/> Painel de Indicadores</h2>
                        </div>

                        {/* Barra de Filtros */}
                        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-8 flex flex-wrap gap-4 items-center anim-entry delay-100">
                            <div className="flex items-center gap-2 text-slate-600 font-bold"><Filter size={18}/> Filtros:</div>
                            <div>
                                <select 
                                    value={filterMonth} 
                                    onChange={(e) => setFilterMonth(e.target.value)}
                                    className="p-2 border border-slate-300 rounded-lg text-sm focus:border-red-900 outline-none hover:border-red-500 transition-colors"
                                >
                                    {Array.from({length: 12}, (_, i) => i + 1).map(m => (
                                        <option key={m} value={m}>{new Date(0, m-1).toLocaleString('pt-BR', {month: 'long'})}</option>
                                    ))}
                                </select>
                            </div>
                            <div>
                                <select 
                                    value={filterYear} 
                                    onChange={(e) => setFilterYear(e.target.value)}
                                    className="p-2 border border-slate-300 rounded-lg text-sm focus:border-red-900 outline-none hover:border-red-500 transition-colors"
                                >
                                    {Array.from({length: 5}, (_, i) => new Date().getFullYear() - 2 + i).map(y => (
                                        <option key={y} value={y}>{y}</option>
                                    ))}
                                </select>
                            </div>
                            <div className="text-sm text-slate-500 ml-auto font-medium">
                                Exibindo dados de <strong className="text-red-900">{filteredPops.length}</strong> processo(s)
                            </div>
                        </div>

                        {stats ? (
                        <div className="bg-red-900 rounded-2xl p-6 text-white shadow-xl shadow-red-900/20 border border-red-800 anim-entry delay-200 transition-all hover:shadow-2xl">
                            <h2 className="text-xl font-bold mb-6 flex items-center gap-2">Resumo do Período</h2>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                                <div className="bg-white p-4 rounded-xl border-l-4 border-red-800 shadow-sm anim-pop delay-300 transform hover:-translate-y-1 transition-transform duration-300">
                                    <p className="text-red-900/70 text-xs uppercase font-bold tracking-wider">Total de POPs</p>
                                    <p className="text-3xl font-bold mt-1 text-red-900">{stats.totalPops}</p>
                                </div>
                                <div className="bg-white p-4 rounded-xl border-l-4 border-red-800 shadow-sm anim-pop delay-400 transform hover:-translate-y-1 transition-transform duration-300">
                                    <p className="text-red-900/70 text-xs uppercase font-bold tracking-wider">% Dentro do Prazo</p>
                                    <p className={`text-3xl font-bold mt-1 ${stats.onTimePercentage < 70 ? 'text-red-600' : 'text-emerald-600'}`}>{stats.onTimePercentage.toFixed(0)}%</p>
                                </div>
                                <div className="bg-white p-4 rounded-xl border-l-4 border-red-800 shadow-sm anim-pop delay-500 transform hover:-translate-y-1 transition-transform duration-300">
                                    <p className="text-red-900/70 text-xs uppercase font-bold tracking-wider">Ciclo Médio (Dias)</p>
                                    <p className="text-3xl font-bold mt-1 text-red-900">{stats.avgCycleTime.toFixed(1)}</p>
                                </div>
                                <div className="bg-white p-4 rounded-xl border-l-4 border-red-800 shadow-sm anim-pop delay-600 transform hover:-translate-y-1 transition-transform duration-300">
                                    <p className="text-red-900/70 text-xs uppercase font-bold tracking-wider">Maior Gargalo</p>
                                    <p className="text-lg font-bold mt-2 text-red-600 flex items-center gap-1"><AlertTriangle size={16}/> {stats.biggestBottleneck}</p>
                                </div>
                            </div>
                            
                            {/* Seção Extra: Hall da Fama e Departamentos */}
                            <div className="mt-8 grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="bg-red-950/50 p-4 rounded-xl border border-red-800/50 anim-entry delay-500 hover:bg-red-950/70 transition-colors">
                                    <h3 className="text-sm font-bold uppercase text-red-200 mb-3 flex items-center gap-2"><Award size={16}/> Processo Mais Ágil</h3>
                                    {stats.bestPop ? (
                                        <div>
                                            <p className="text-lg font-bold">{stats.bestPop.titulo}</p>
                                            <p className="text-xs text-red-200 mt-1 flex items-center gap-1">
                                                <CheckCircle size={12}/> Concluído em <strong className="text-white">{stats.bestPop.totalExecutado}</strong> dias
                                            </p>
                                        </div>
                                    ) : <p className="text-sm text-red-300">-</p>}
                                </div>
                                <div className="bg-red-950/50 p-4 rounded-xl border border-red-800/50 anim-entry delay-600 hover:bg-red-950/70 transition-colors">
                                    <h3 className="text-sm font-bold uppercase text-red-200 mb-3 flex items-center gap-2"><AlertTriangle size={16}/> Top Atrasos por Depto</h3>
                                    {stats.rankedDepts.length > 0 ? (
                                        <ul className="text-sm space-y-2">
                                            {stats.rankedDepts.slice(0,3).map((d, i) => (
                                                <li key={i} className="flex justify-between items-center bg-red-900/30 p-2 rounded-lg">
                                                    <span>{d.name}</span> 
                                                    <span className="font-bold bg-red-600 px-2 py-0.5 rounded text-xs">{d.count} atrasos</span>
                                                </li>
                                            ))}
                                        </ul>
                                    ) : <p className="text-sm text-red-300">Sem atrasos registrados.</p>}
                                </div>
                            </div>

                        </div>
                        ) : (
                            <div className="text-center py-20 bg-white rounded-2xl border border-dashed border-slate-300 anim-entry delay-200">
                                <div className="bg-slate-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 animate-bounce"><Calendar size={32} className="text-slate-400" /></div>
                                <h3 className="text-lg font-bold text-slate-600">Nenhum dado encontrado</h3>
                                <p className="text-slate-500 mt-2">Não há processos registrados para {filterMonth}/{filterYear}.</p>
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className="min-h-screen bg-slate-100 font-sans text-slate-800">
                <header className="bg-red-950 text-white p-6 shadow-md border-b-4 border-red-800">
                    <div className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                    <div className="flex items-center gap-3">
                        <div className="bg-red-800 p-2 rounded-lg"><Clock size={24} className="text-white" /></div>
                        <div><h1 className="text-2xl font-bold tracking-tight">COMPLIANCE & PROCESSOS</h1><p className="text-red-200 text-sm">Gestor de Pops e normas interna</p></div>
                    </div>
                    <div className="flex gap-2">
                        <button onClick={() => setViewMode('dashboard')} className={`px-4 py-2 rounded-lg font-medium transition-colors flex items-center gap-2 ${viewMode === 'dashboard' ? 'bg-red-800 text-white shadow-lg' : 'bg-red-900/50 text-red-100 hover:bg-red-800'}`}>
                            <BarChart2 size={18}/> Indicadores
                        </button>
                        <button onClick={() => setViewMode('list')} className={`px-4 py-2 rounded-lg font-medium transition-colors ${viewMode === 'list' ? 'bg-red-800 text-white shadow-lg' : 'bg-red-900/50 text-red-100 hover:bg-red-800'}`}>Lista</button>
                        <button onClick={() => setViewMode('form')} className={`px-4 py-2 rounded-lg font-medium transition-colors ${viewMode === 'form' ? 'bg-red-800 text-white shadow-lg' : 'bg-red-900/50 text-red-100 hover:bg-red-800'}`}>+ Novo POP</button>
                    </div>
                    </div>
                </header>
                <main className="max-w-6xl mx-auto p-6">
                    {viewMode === 'form' && (
                    <div className="bg-white rounded-2xl shadow-xl p-8 max-w-4xl mx-auto animation-fade-in border-t-4 border-red-900">
                        <h2 className="text-2xl font-bold mb-6 text-slate-800 flex items-center gap-2 border-b pb-4"><FileText className="text-red-900" /> Cadastro de Processo (SLA)</h2>
                        <form onSubmit={handleSubmit} className="space-y-8">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div><label className="block text-sm font-semibold text-slate-600 mb-2">Nome do POP</label><input required name="titulo" value={formData.titulo} onChange={handleChange} placeholder="Ex: Procedimento de Vendas" className="w-full p-3 border border-slate-300 rounded-lg outline-none focus:border-red-900 focus:ring-1 focus:ring-red-900 transition-all" /></div>
                            <div><label className="block text-sm font-semibold text-slate-600 mb-2">Data de Início</label><input type="date" required name="dataInicio" value={formData.dataInicio} onChange={handleChange} className="w-full p-3 border border-slate-300 rounded-lg outline-none focus:border-red-900 focus:ring-1 focus:ring-red-900 transition-all" /></div>
                        </div>
                        <div className="bg-slate-50 p-6 rounded-xl border border-slate-200">
                            <h3 className="text-lg font-semibold mb-6 text-slate-700 flex items-center gap-2"><Activity size={18} className="text-red-900"/> Detalhamento por Etapa</h3>
                            {/* ETAPA 1 */} <div className="mb-6 pb-6 border-b border-slate-200"> <div className="flex items-center gap-2 mb-3"> <div className="w-6 h-6 rounded-full bg-red-100 text-red-900 flex items-center justify-center font-bold text-xs">1</div> <label className="font-bold text-slate-700">Reunião de Criação</label> </div> <div className="grid grid-cols-1 md:grid-cols-12 gap-4 items-end"> <div className="md:col-span-4"> <span className="text-xs text-slate-500 mb-1 block">Responsável Principal</span> <input name="reuniaoResponsavel" value={formData.reuniaoResponsavel} onChange={handleChange} placeholder="Nome" className="w-full p-2 border rounded focus:border-red-900 outline-none" /> </div> <div className="md:col-span-4"> <span className="text-xs text-slate-500 mb-1 block">Departamento</span> <input name="reuniaoDepartamento" value={formData.reuniaoDepartamento} onChange={handleChange} placeholder="Ex: Qualidade" className="w-full p-2 border rounded focus:border-red-900 outline-none" /> </div> <div className="md:col-span-2"> <span className="text-xs text-slate-500 mb-1 block">Meta (dias)</span> <input type="number" min="0" name="reuniaoPlanejado" value={formData.reuniaoPlanejado} onChange={handleChange} className="w-full p-2 border rounded text-center bg-slate-50 focus:border-red-900 outline-none" /> </div> <div className="md:col-span-2"> <span className="text-xs text-slate-500 mb-1 block">Executado (dias)</span> <input type="number" min="0" name="reuniaoExecutado" value={formData.reuniaoExecutado} onChange={handleChange} className="w-full p-2 border border-red-200 rounded text-center bg-white font-bold text-red-900 focus:border-red-900 outline-none" /> </div> </div> </div>
                            {/* ETAPA 2 */} <div className="mb-6 pb-6 border-b border-slate-200"> <div className="flex items-center gap-2 mb-3"> <div className="w-6 h-6 rounded-full bg-red-100 text-red-900 flex items-center justify-center font-bold text-xs">2</div> <label className="font-bold text-slate-700">Retorno do Gestor</label> </div> <div className="grid grid-cols-1 md:grid-cols-12 gap-4 items-end"> <div className="md:col-span-4"> <span className="text-xs text-slate-500 mb-1 block">Nome do Gestor</span> <input name="retornoResponsavel" value={formData.retornoResponsavel} onChange={handleChange} placeholder="Gestor" className="w-full p-2 border rounded focus:border-red-900 outline-none" /> </div> <div className="md:col-span-4"> <span className="text-xs text-slate-500 mb-1 block">Departamento</span> <input name="retornoDepartamento" value={formData.retornoDepartamento} onChange={handleChange} placeholder="Ex: Comercial" className="w-full p-2 border rounded focus:border-red-900 outline-none" /> </div> <div className="md:col-span-2"> <span className="text-xs text-slate-500 mb-1 block">Meta</span> <input type="number" min="0" name="retornoPlanejado" value={formData.retornoPlanejado} onChange={handleChange} className="w-full p-2 border rounded text-center bg-slate-50 focus:border-red-900 outline-none" /> </div> <div className="md:col-span-2"> <span className="text-xs text-slate-500 mb-1 block">Executado</span> <input type="number" min="0" name="retornoExecutado" value={formData.retornoExecutado} onChange={handleChange} className="w-full p-2 border border-red-200 rounded text-center bg-white font-bold text-red-900 focus:border-red-900 outline-none" /> </div> </div> </div>
                            {/* ETAPA 3 */} <div className="mb-6 pb-6 border-b border-slate-200"> <div className="flex items-center gap-2 mb-3"> <div className="w-6 h-6 rounded-full bg-red-100 text-red-900 flex items-center justify-center font-bold text-xs">3</div> <label className="font-bold text-slate-700">Produção da Norma</label> </div> <div className="grid grid-cols-1 md:grid-cols-12 gap-4 items-end"> <div className="md:col-span-4"> <span className="text-xs text-slate-500 mb-1 block">Quem Produz</span> <input name="producaoResponsavel" value={formData.producaoResponsavel} onChange={handleChange} placeholder="Analista" className="w-full p-2 border rounded focus:border-red-900 outline-none" /> </div> <div className="md:col-span-4"> <span className="text-xs text-slate-500 mb-1 block">Departamento</span> <input name="producaoDepartamento" value={formData.producaoDepartamento} onChange={handleChange} placeholder="Ex: Processos" className="w-full p-2 border rounded focus:border-red-900 outline-none" /> </div> <div className="md:col-span-2"> <span className="text-xs text-slate-500 mb-1 block">Meta</span> <input type="number" min="0" name="producaoPlanejado" value={formData.producaoPlanejado} onChange={handleChange} className="w-full p-2 border rounded text-center bg-slate-50 focus:border-red-900 outline-none" /> </div> <div className="md:col-span-2"> <span className="text-xs text-slate-500 mb-1 block">Executado</span> <input type="number" min="0" name="producaoExecutado" value={formData.producaoExecutado} onChange={handleChange} className="w-full p-2 border border-red-200 rounded text-center bg-white font-bold text-red-900 focus:border-red-900 outline-none" /> </div> </div> </div>
                            {/* ETAPA 4 */} <div className="mb-6 pb-6 border-b border-slate-200"> <div className="flex items-center gap-2 mb-3"> <div className="w-6 h-6 rounded-full bg-red-100 text-red-900 flex items-center justify-center font-bold text-xs">4</div> <label className="font-bold text-slate-700">Aprovação Final</label> </div> <div className="grid grid-cols-1 md:grid-cols-12 gap-4 items-end"> <div className="md:col-span-4"> <span className="text-xs text-slate-500 mb-1 block">Aprovador Final</span> <input name="aprovacaoResponsavel" value={formData.aprovacaoResponsavel} onChange={handleChange} placeholder="Diretor" className="w-full p-2 border rounded focus:border-red-900 outline-none" /> </div> <div className="md:col-span-4"> <span className="text-xs text-slate-500 mb-1 block">Departamento</span> <input name="aprovacaoDepartamento" value={formData.aprovacaoDepartamento} onChange={handleChange} placeholder="Ex: Diretoria" className="w-full p-2 border rounded focus:border-red-900 outline-none" /> </div> <div className="md:col-span-2"> <span className="text-xs text-slate-500 mb-1 block">Meta</span> <input type="number" min="0" name="aprovacaoPlanejado" value={formData.aprovacaoPlanejado} onChange={handleChange} className="w-full p-2 border rounded text-center bg-slate-50 focus:border-red-900 outline-none" /> </div> <div className="md:col-span-2"> <span className="text-xs text-slate-500 mb-1 block">Executado</span> <input type="number" min="0" name="aprovacaoExecutado" value={formData.aprovacaoExecutado} onChange={handleChange} className="w-full p-2 border border-red-200 rounded text-center bg-white font-bold text-red-900 focus:border-red-900 outline-none" /> </div> </div> </div>
                            <div className="bg-red-50 p-4 rounded-lg border border-red-100"> <div className="flex items-center gap-2 mb-3"> <UploadCloud className="text-red-900" size={20}/> <label className="font-bold text-red-900 text-sm">Anexar PDF do POP (Opcional)</label> </div> <div className="relative"> <input type="file" name="pdfFile" accept=".pdf" onChange={handleChange} className="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-red-900 file:text-white hover:file:bg-red-800" /> <p className="text-xs text-slate-500 mt-2">Formatos aceitos: PDF. Tamanho máximo recomendado: 5MB.</p> </div> </div>
                        </div>
                        <div className="flex justify-end gap-3 pt-4 border-t border-slate-100">
                            <button type="button" onClick={() => setViewMode('list')} className="px-6 py-3 rounded-lg text-slate-600 font-medium hover:bg-slate-100 transition-colors">Cancelar</button>
                            <button type="submit" className="px-6 py-3 rounded-lg bg-red-900 text-white font-bold hover:bg-red-800 shadow-lg shadow-red-200 transition-all flex items-center gap-2"><Save size={20} /> Salvar Processo</button>
                        </div>
                        </form>
                    </div>
                    )}

                    {/* View de Dashboard */}
                    {viewMode === 'dashboard' && renderDashboard()}

                    {viewMode === 'list' && (
                    <div>
                        {pops.length === 0 ? (
                        <div className="text-center py-20 bg-white rounded-2xl border border-dashed border-red-200">
                            <div className="bg-red-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4"><FileText size={40} className="text-red-300" /></div>
                            <h3 className="text-xl font-bold text-slate-700">Nenhum POP cadastrado</h3>
                            <p className="text-slate-500 mt-2 mb-6">Comece adicionando um novo processo para visualizar os indicadores.</p>
                            <button onClick={() => setViewMode('form')} className="px-6 py-3 rounded-lg bg-red-900 text-white font-bold hover:bg-red-800 shadow-lg transition-all">Criar Primeiro POP</button>
                        </div>
                        ) : (
                        <div className="grid grid-cols-1 gap-6">
                            <div className="flex items-center justify-between mb-2">
                            <h2 className="text-lg font-bold text-slate-700">Detalhamento dos Processos</h2>
                            </div>
                            {pops.map(pop => <DiagnosticCard key={pop.id} pop={pop} />)}
                        </div>
                        )}
                    </div>
                    )}
                </main>
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
